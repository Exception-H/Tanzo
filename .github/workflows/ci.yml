name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Type Check & Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: |
          set +e
          pnpm test > test-out.txt 2>&1
          status=$?
          sed 's/\x1b\[[0-9;]*m//g' test-out.txt
          if [ $status -ne 0 ]; then
            sed 's/\x1b\[[0-9;]*m//g' test-out.txt > clean.txt
            # Emit the whole "Failed Suites/Tests" detail region as one annotation block
            awk '/Failed (Suites|Tests)/{f=1} f{print}' clean.txt | head -120 > detail.txt
            if [ ! -s detail.txt ]; then tail -120 clean.txt > detail.txt; fi
            body=$(sed 's/%/%25/g; s/\r//g' detail.txt | awk '{printf "%s%%0A", $0}')
            echo "::error::$body"
          fi
          exit $status
